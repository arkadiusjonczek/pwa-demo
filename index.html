<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini PWA</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; }
        button { padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Notiz-Speicher</h1>
    <textarea id="noteInput" placeholder="Schreib was..."></textarea>
    <button onclick="saveNote()">Speichern</button>
    <h3>Deine Notiz:</h3>
    <p id="output"></p>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
